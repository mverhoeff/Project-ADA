stt:
  model: large-v3-turbo
  device: cuda
  compute_type: int8
  port: 8771

llm:
  model: qwen3:8b
  ollama_url: http://localhost:11434
  context_window: 8192
  max_history_turns: 20
  temperature: 0.7

tts:
  model: kokoro-v1.0
  voice: af_sky
  speed: 1.0
  port: 8772
  stream: true

agent:
  browser_headless: true
  shell_timeout_seconds: 30
  allowed_paths:
    - ~/Documents
    - ~/Downloads
    - ~/Desktop

audio:
  mic_sample_rate: 16000
  silence_threshold_ms: 1500
  max_recording_ms: 30000
  vad_aggressiveness: 2
  input_device: null
  output_device: null

orchestrator:
  queue_size: 5
  max_tool_iterations: 10

ui:
  hotkey: ctrl+alt+space
  wake_word_enabled: false

vram:
  warning_threshold_percent: 90
  flush_threshold_percent: 95

app:
  service_startup_timeout_seconds: 120
  service_shutdown_timeout_seconds: 10
