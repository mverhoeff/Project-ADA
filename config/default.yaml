stt:
  model: large-v3-turbo
  device: cuda
  compute_type: int8
  port: 8771

llm:
  model: qwen3:8b
  ollama_url: http://localhost:11434
  context_window: 8192
  max_history_turns: 20
  temperature: 0.7

tts:
  model: kokoro-v1.0
  voice: af_sky
  speed: 1.25
  port: 8772
  stream: true

agent:
  browser_enabled: true
  browser_headless: true
  browser_search_engine: duckduckgo
  browser_max_results: 5
  browser_navigation_timeout_ms: 15000
  web_fetch_max_chars: 4000
  shell_timeout_seconds: 30
  allowed_paths:
    - ~/Documents
    - ~/Downloads
    - ~/Desktop

audio:
  mic_sample_rate: 16000
  silence_threshold_ms: 1500
  max_recording_ms: 30000
  vad_aggressiveness: 2
  input_device: 1
  output_device: 4
  barge_in_enabled: false
  barge_in_consecutive_speech_ms: 300
  barge_in_vad_aggressiveness: 3

orchestrator:
  queue_size: 5
  max_tool_iterations: 10

ui:
  hotkey: ctrl+alt+space
  wake_word_enabled: false

vram:
  warning_threshold_percent: 95
  flush_threshold_percent: 95

app:
  service_startup_timeout_seconds: 600
  service_shutdown_timeout_seconds: 10
